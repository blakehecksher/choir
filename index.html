<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Choir</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <svg id="stage" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet" aria-label="A choir of mouths responding to music">
    <defs>
      <filter id="dot-soft" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="0.6" />
      </filter>
      <path id="conductor-path"
            d="M 500 430
               C 500 390, 620 390, 620 430
               C 620 470, 500 470, 500 430
               C 500 390, 380 390, 380 430
               C 380 470, 500 470, 500 430 Z" />
    </defs>

    <g id="choir">
      <g id="row-1" class="row"></g>
      <g id="row-2" class="row"></g>
      <g id="row-3" class="row"></g>
      <g id="row-4" class="row"></g>
    </g>

    <g id="conductor">
      <circle id="dot-single" cx="500" cy="430" r="14" class="dot dot-single" />
      <circle id="dot-a" cx="500" cy="430" r="10" class="dot dot-pair hidden" />
      <circle id="dot-b" cx="500" cy="430" r="10" class="dot dot-pair hidden" />
      <path id="conductor-play" class="conductor-icon" />
      <g id="conductor-pause" class="conductor-icon hidden">
        <rect id="pause-bar-l" />
        <rect id="pause-bar-r" />
      </g>
      <circle id="dot-hit" cx="500" cy="430" r="60" class="dot-hit" />
    </g>
  </svg>

  <div id="song-title" class="song-title"></div>

  <div class="icons">
    <button id="shuffle-btn" class="icon-btn" type="button" aria-label="Shuffle song">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="8" cy="8" r="1.3" fill="currentColor"/>
        <circle cx="16" cy="8" r="1.3" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.3" fill="currentColor"/>
        <circle cx="8" cy="16" r="1.3" fill="currentColor"/>
        <circle cx="16" cy="16" r="1.3" fill="currentColor"/>
      </svg>
    </button>
    <button id="upload-btn" class="icon-btn" type="button" aria-label="Upload audio file">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M12 16 V5 M7 10 L12 5 L17 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 19 H20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <input type="file" id="upload-input" accept="audio/*" hidden>
  </div>

  <audio id="audio" crossorigin="anonymous" preload="auto"></audio>

  <div id="debug-panel" style="
    display:none; position:fixed; top:0; right:0; width:260px; max-height:100vh;
    overflow-y:auto; background:rgba(0,0,0,0.82); color:#ddd; font:12px/1.4 monospace;
    padding:10px 12px 16px; z-index:9999; box-sizing:border-box;
  ">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong style="font-size:13px">CONFIG</strong>
      <button id="debug-close" style="background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;padding:0">×</button>
    </div>
    <div id="debug-sliders"></div>
  </div>

  <button id="debug-toggle" style="
    position:fixed; bottom:12px; right:12px; background:rgba(0,0,0,0.5);
    color:#aaa; border:1px solid #444; border-radius:4px; font:11px monospace;
    padding:4px 8px; cursor:pointer; z-index:9999;
  ">debug</button>

  <script type="module" src="main.js"></script>
</body>
</html>
